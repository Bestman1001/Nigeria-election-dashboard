name: Sync INEC party logos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Refresh INEC party logo assets
        run: node scripts/sync-party-logos.mjs
      - name: Commit logo changes
        run: |
          if git diff --quiet -- assets/party-logos; then
            echo "No party logo changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/party-logos
          git commit -m "Sync INEC party logos"
          git push
