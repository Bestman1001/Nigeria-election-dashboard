name: Sync trusted live feed

on:
  workflow_dispatch:
    inputs:
      live_results_url:
        description: "Trusted JSON endpoint to mirror into assets/live-results.json"
        required: false
        type: string
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      LIVE_RESULTS_URL: ${{ github.event.inputs.live_results_url || vars.LIVE_RESULTS_URL || secrets.LIVE_RESULTS_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Mirror trusted live JSON
        run: node scripts/sync-live-feed.mjs
      - name: Commit updated live feed
        run: |
          if git diff --quiet -- assets/live-results.json; then
            echo "No live feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/live-results.json
          git commit -m "Sync trusted live election feed"
          git push
